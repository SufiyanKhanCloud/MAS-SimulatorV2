---
- name: Deploy MAS Simulator to AWS EC2
  hosts: webservers
  become: yes

  tasks:
    - name: Update apt cache
      apt:
        update_cache: yes

    - name: Install Docker dependencies
      apt:
        name:
          - apt-transport-https
          - ca-certificates
          - curl
          - software-properties-common
        state: present

    - name: Install Docker
      apt:
        name: docker.io
        state: present

    - name: Ensure Docker service is running
      service:
        name: docker
        state: started
        enabled: yes

    # --- NEW SHELL COMMANDS ---
    - name: Remove old container if it exists
      shell: docker rm -f nextjs-mas-simulator || true

    - name: Pull and run the MAS Simulator container
      shell: docker run -d --name nextjs-mas-simulator -p 3000:3000 --restart unless-stopped sufiyankhan10/mas-simulator:latest