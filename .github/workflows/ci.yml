name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  test-application:
    name: Build and Test Next.js
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g pnpm@10.30.3
      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
        env:
          NEXT_TELEMETRY_DISABLED: 1

  build-and-push:
    name: Build and Push Docker Image
    needs: test-application
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # This step securely logs into Docker Hub using the secrets you just made
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Build and push the image directly to your public Docker Hub profile
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile
          push: true
          # We tag it twice: once as 'latest' and once with the exact Git commit hash
          tags: ${{ secrets.DOCKERHUB_USERNAME }}/mas-simulator:latest, ${{ secrets.DOCKERHUB_USERNAME }}/mas-simulator:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max